# NAME: LiangbuLu_GaoDe
# DESC: 两步路 App 高德地图专用直连规则，在 blackmatrix7 官方 GaoDe 规则基础上，
#       补充实测验证必需的 DOMAIN-KEYWORD 兜底规则及 alicdn.com（高德静态资源 CDN）
# BASED-ON: https://github.com/blackmatrix7/ios_rule_script (rule/Clash/GaoDe/GaoDe_No_Resolve.yaml)
# UPDATED: 2026-07-12
# NOTE: 本文件为手动维护，如两步路调用高德的其他接口域名有变化，
#       可通过 Stash 连接日志（Connections）抓取后追加到 payload 中
behavior: classical
payload:
  # ====== blackmatrix7 官方 GaoDe 规则（9条） ======
  - DOMAIN-SUFFIX,a-map.cn
  - DOMAIN-SUFFIX,a-map.co
  - DOMAIN-SUFFIX,a-map.link
  - DOMAIN-SUFFIX,a-map.vip
  - DOMAIN-SUFFIX,amap.com
  - DOMAIN-SUFFIX,amapauto.com
  - DOMAIN-SUFFIX,anav.com
  - DOMAIN-SUFFIX,autonavi.com
  - DOMAIN-SUFFIX,gaode.com

  # ====== 实测验证必需的兜底规则 ======
  # 注：曾实测证明，仅靠上方 DOMAIN-SUFFIX 不足以覆盖两步路 App 实际请求的
  # 全部高德瓦片图/接口域名，注释掉以下两条后地图加载会重新变卡，
  # 说明存在中间包含 amap/autonavi 但不以 amap.com/autonavi.com 结尾的域名
  - DOMAIN-KEYWORD,amap
  - DOMAIN-KEYWORD,autonavi

  # ====== 高德部分静态资源使用的阿里云通用 CDN ======
  - DOMAIN-SUFFIX,alicdn.com

  # ====== 实测抓包确认（两步路连接日志） ======
  # webrd03.is.autonavi.com 已被上方 autonavi.com 后缀覆盖，此处仅作记录
