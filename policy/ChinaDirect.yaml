# NAME: My_Personal_Direct_Whitelist
# 适用范围：京东/淘宝/拼多多购物、视频、抖音、社交及系统基础
# 剔除内容：国产游戏、银行金融、地方门户、杂项域名

payload:
  # ==========================================================
  # 【购物与生活】—— 一网打尽主流电商
  # ==========================================================
  # --- 京东 (JD) ---
  - DOMAIN-SUFFIX,jd.com
  - DOMAIN-SUFFIX,360buyimg.com   # 京东核心图片库
  - DOMAIN-SUFFIX,jdpay.com       # 京东支付
  - DOMAIN-SUFFIX,jcloud.com      # 京东云
  
  # --- 淘宝/天猫/阿里系 ---
  - DOMAIN-SUFFIX,taobao.com
  - DOMAIN-SUFFIX,tmall.com
  - DOMAIN-SUFFIX,alicdn.com      # 阿里系全局加速（必留）
  - DOMAIN-SUFFIX,aliyun.com      # 阿里云
  - DOMAIN-SUFFIX,alipay.com      # 支付宝
  
  # ==========================================================
  # 【短视频与影音】—— 包含抖音及主流视频
  # ==========================================================
  # --- 抖音/字节跳动 (Douyin) ---
  - DOMAIN-SUFFIX,douyin.com
  - DOMAIN-SUFFIX,amemv.com       # 抖音视频存储
  - DOMAIN-SUFFIX,pstatp.com      # 字节跳动静态资源
  - DOMAIN-SUFFIX,snssdk.com      # 字节跳动系统接口
  - DOMAIN-SUFFIX,bytedance.com
  
  # --- 哔哩哔哩 (Bilibili) ---
  - DOMAIN-SUFFIX,bilibili.com
  - DOMAIN-SUFFIX,bilivideo.com   # B站视频流
  - DOMAIN-SUFFIX,hdslb.com       # B站图片/静态资源
  
  # --- 优爱腾 & 芒果 ---
  - DOMAIN-SUFFIX,iqiyi.com       # 爱奇艺
  - DOMAIN-SUFFIX,qiyi.com
  - DOMAIN-SUFFIX,youku.com       # 优酷
  - DOMAIN-SUFFIX,v.qq.com        # 腾讯视频
  - DOMAIN-SUFFIX,mgtv.com        # 芒果TV

  # ==========================================================
  # 【社交与生产力】
  # ==========================================================
  # --- 微信/QQ (腾讯社交) ---
  - DOMAIN-SUFFIX,weixin.com
  - DOMAIN-SUFFIX,wechat.com
  - DOMAIN-SUFFIX,qq.com
  - DOMAIN-SUFFIX,gtimg.com       # 腾讯核心静态资源
  
  # --- 社交媒体 ---
  - DOMAIN-SUFFIX,weibo.com       # 微博
  - DOMAIN-SUFFIX,zhihu.com       # 知乎
  - DOMAIN-SUFFIX,xiaohongshu.com # 小红书
  - DOMAIN-SUFFIX,jiayuan.com     # 世纪佳缘  
  
  # --- 微软与系统工具 ---
  - DOMAIN-SUFFIX,microsoft.com   # Windows更新/Office
  - DOMAIN-SUFFIX,windows.com
  - DOMAIN-SUFFIX,wps.com         # 金山办公
  - DOMAIN-SUFFIX,aliyundrive.com # 阿里云盘

  # ==========================================================
  # 【基础服务】—— 建议保留，否则国内网站加载会变慢
  # ==========================================================
  - DOMAIN-SUFFIX,baidu.com       # 百度及相关CDN
  - DOMAIN-SUFFIX,bdstatic.com
  - DOMAIN-SUFFIX,chinacache.net  # 国内大型加速节点
